<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Каталог контактов застройщиков | Новостройки и загородная недвижимость</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #020617 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .sub {
            color: #94a3b8;
            margin-bottom: 20px;
        }

        /* Поиск */
        .search-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .search-wrapper input {
            flex: 2;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }

        .search-wrapper input::placeholder {
            color: #94a3b8;
        }

        .search-wrapper select {
            padding: 16px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 48px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #e2e8f0;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab {
            padding: 12px 28px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 48px;
        }

        .tab.active {
            background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 100%);
            color: white;
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Каталог */
        .catalog {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Карточка застройщика */
        .developer-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .developer-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(167, 139, 250, 0.3);
        }

        .developer-header {
            padding: 20px 24px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .developer-header:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .developer-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .developer-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #a78bfa, #3b82f6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .developer-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
        }

        .developer-stats {
            display: flex;
            gap: 15px;
            margin-top: 5px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .developer-stats span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .toggle-icon {
            font-size: 1.2rem;
            color: #a78bfa;
            transition: transform 0.3s ease;
        }

        .developer-card.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .developer-card.collapsed .complexes-list {
            display: none;
        }

        /* Список ЖК */
        .complexes-list {
            padding: 0 24px 24px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .complex-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-top: 16px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .complex-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .complex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .complex-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .complex-name i {
            color: #a78bfa;
            font-size: 1rem;
        }

        .complex-phone {
            background: rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #10b981;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .complex-details {
            padding-left: 25px;
            margin-top: 12px;
            display: none;
        }

        .complex-item.collapsed .complex-details {
            display: none;
        }

        .complex-item:not(.collapsed) .complex-details {
            display: block;
        }

        .complex-address {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .managers-title {
            font-size: 0.85rem;
            color: #a78bfa;
            margin: 12px 0 8px 0;
            font-weight: 600;
        }

        .manager-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .manager-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .manager-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .manager-name {
            color: #f1f5f9;
            font-weight: 500;
        }

        .manager-role {
            font-size: 0.75rem;
            color: #a78bfa;
            background: rgba(167, 139, 250, 0.15);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .manager-phone {
            color: #10b981;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.7rem;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #a78bfa;
            color: white;
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Админ-кнопка */
        .admin-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #a78bfa, #3b82f6);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
            text-decoration: none;
        }

        .admin-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.4);
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 100px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .developer-header {
                padding: 15px 20px;
            }
            .developer-name {
                font-size: 1.1rem;
            }
            .complexes-list {
                padding: 0 16px 16px 16px;
            }
            .manager-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .admin-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-building"></i> Каталог застройщиков</h1>
            <div class="sub">Новостройки и загородная недвижимость Новосибирска — контакты отделов продаж</div>
            
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Поиск по застройщику, ЖК, менеджеру или телефону...">
                <select id="categoryFilter">
                    <option value="all">Все категории</option>
                    <option value="newbuild">🏢 Новостройки</option>
                    <option value="suburban">🏡 Загородная</option>
                </select>
                <button class="btn btn-primary" id="searchBtn">
                    <i class="fas fa-search"></i> Найти
                </button>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" data-category="all">
                <i class="fas fa-th-large"></i> Все
            </button>
            <button class="tab" data-category="newbuild">
                <i class="fas fa-city"></i> Новостройки
            </button>
            <button class="tab" data-category="suburban">
                <i class="fas fa-tree"></i> Загородная
            </button>
        </div>

        <!-- Каталог -->
        <div class="catalog" id="catalog">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Загрузка данных...</p>
            </div>
        </div>
    </div>

    <!-- Кнопка админ-панели -->
    <a href="../app/contacts-manager.html" class="admin-btn" title="Управление контактами">
        <i class="fas fa-address-book"></i>
    </a>

    <script src="../pages/main.js"></script>
    <script>
    // Обработка параметра категории из URL
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('category');
        
        if (category === 'newbuild') {
            // Активируем вкладку Новостройки
            setTimeout(() => {
                const newbuildTab = document.querySelector('.tab[data-category="newbuild"]');
                if (newbuildTab) {
                    newbuildTab.click();
                }
                // Меняем заголовок для контекста
                const headerTitle = document.querySelector('.header h1');
                if (headerTitle) {
                    headerTitle.innerHTML = '<i class="fas fa-city"></i> Новостройки Новосибирска';
                }
            }, 100);
        } else if (category === 'suburban') {
            setTimeout(() => {
                const suburbanTab = document.querySelector('.tab[data-category="suburban"]');
                if (suburbanTab) {
                    suburbanTab.click();
                }
                const headerTitle = document.querySelector('.header h1');
                if (headerTitle) {
                    headerTitle.innerHTML = '<i class="fas fa-tree"></i> Загородная недвижимость';
                }
            }, 100);
        }
    })();
</script>
</body>
</html>
