<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Управление контактами ЖК - Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #020617 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 50%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub {
            color: #94a3b8;
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 48px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a78bfa 0%, #3b82f6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Поиск и фильтры */
        .search-section {
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 2;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }

        .search-box input::placeholder {
            color: #94a3b8;
        }

        .search-box select {
            padding: 14px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
        }

        /* Форма добавления */
        .form-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            border: 2px solid rgba(167, 139, 250, 0.3);
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a78bfa;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Менеджеры */
        .managers-list {
            margin-top: 20px;
        }

        .manager-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .manager-item input {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
        }

        /* Таблица */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btns button {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .manager-item {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1><i class="fas fa-address-book"></i> Управление контактами ЖК</h1>
                <div class="sub">Добавление и редактирование контактов застройщиков</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" id="exportBtn">
                    <i class="fas fa-download"></i> Экспорт CSV
                </button>
                <button class="btn btn-primary" id="showFormBtn">
                    <i class="fas fa-plus"></i> Новый контакт
                </button>
            </div>
        </div>

        <!-- Форма добавления/редактирования -->
        <div class="form-panel" id="formPanel">
            <h3 style="color: white; margin-bottom: 20px;" id="formTitle">
                <i class="fas fa-plus-circle"></i> Добавление контакта
            </h3>
            
            <div class="form-group">
                <label>Выберите или добавьте застройщика:</label>
                <input type="text" id="developerInput" placeholder="Например: Брусника. Сибакадемстрой" list="developersList">
                <datalist id="developersList"></datalist>
                <small style="color: #94a3b8;">Можно выбрать из списка или ввести новый</small>
            </div>

            <div class="form-group">
                <label>Выберите или добавьте ЖК:</label>
                <input type="text" id="complexInput" placeholder="Например: Авиатор" list="complexesList">
                <datalist id="complexesList"></datalist>
            </div>

            <div class="form-group">
                <label>Адрес ЖК:</label>
                <input type="text" id="addressInput" placeholder="ул. Примерная, 123">
            </div>

            <div class="form-group">
                <label>Адрес офиса продаж:</label>
                <input type="text" id="opAddressInput" placeholder="ул. Офисная, 456">
            </div>

            <div class="form-group">
                <label>Общий телефон отдела продаж:</label>
                <input type="text" id="commonPhoneInput" placeholder="+7 (383) 123-45-67">
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">

            <h4 style="color: white; margin-bottom: 15px;">
                <i class="fas fa-users"></i> Контактные лица (менеджеры)
            </h4>
            
            <div id="managersContainer">
                <div class="manager-item">
                    <input type="text" placeholder="Имя менеджера" class="manager-name">
                    <input type="text" placeholder="Телефон" class="manager-phone">
                    <select class="manager-role">
                        <option value="менеджер">Менеджер</option>
                        <option value="руководитель ОП">Руководитель ОП</option>
                        <option value="специалист по работе с партнерами">Специалист по работе с партнерами</option>
                    </select>
                    <button class="btn btn-danger remove-manager" style="padding: 8px 16px;">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <button class="btn btn-secondary" id="addManagerBtn" style="margin: 10px 0 20px;">
                <i class="fas fa-plus"></i> Добавить менеджера
            </button>

            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn btn-secondary" id="cancelFormBtn">Отмена</button>
                <button class="btn btn-success" id="saveContactBtn">Сохранить</button>
            </div>
        </div>

        <!-- Статистика -->
        <div class="stats-bar" id="statsBar">
            <span><i class="fas fa-building"></i> Застройщиков: <strong id="developersCount">0</strong></span>
            <span><i class="fas fa-home"></i> ЖК: <strong id="complexesCount">0</strong></span>
            <span><i class="fas fa-phone"></i> Контактов: <strong id="contactsCount">0</strong></span>
        </div>

        <!-- Поиск -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по застройщику, ЖК или менеджеру...">
                <select id="filterType">
                    <option value="all">Все</option>
                    <option value="developer">Застройщики</option>
                    <option value="complex">ЖК</option>
                    <option value="contact">Контакты</option>
                </select>
                <button class="btn btn-primary" id="searchBtn">
                    <i class="fas fa-search"></i> Найти
                </button>
            </div>
        </div>

        <!-- Таблица данных -->
        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Застройщик</th>
                        <th>ЖК</th>
                        <th>Адрес</th>
                        <th>Общий телефон</th>
                        <th>Менеджеры</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="6" style="text-align: center;">Загрузка данных...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../pages/contacts-manager.js"></script>
</body>
</html>
